<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#4A6A83">
<meta name="robots" content="noindex">
<meta name="referrer" content="no-referrer">
<title>KRS Schüler-Hub</title>
<style>
:root{
  --krs-blau:#4A6A83; --krs-blau-dunkel:#3a5468; --krs-orange:#E87722; --krs-gelb:#F5B335;
  --bg:#f4f6f8; --bg-subtle:#eceff2; --card:#ffffff; --text:#22303c; --text-dim:#5b6b7a;
  --border:#dde3e9; --success:#1a9c6b; --danger:#c0392b;
  --shadow:0 1px 3px rgba(34,48,60,.10); --shadow-lg:0 6px 24px rgba(34,48,60,.14);
  --radius:14px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
button{font:inherit;cursor:pointer;border:none;background:none;min-height:44px}
input,select,textarea{font:inherit;color:inherit}
a{color:var(--krs-blau)}

/* ===== Mode-Badge ===== */
.mode-badge{position:fixed;bottom:10px;left:10px;padding:5px 9px;border-radius:5px;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.8px;z-index:100;box-shadow:var(--shadow-lg);pointer-events:none}
.mode-badge.demo{background:var(--krs-orange);color:#fff}
.mode-badge.produktiv{background:var(--success);color:#fff;opacity:.85}

/* ===== Login ===== */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(160deg,var(--krs-blau) 0%,var(--krs-blau-dunkel) 100%)}
.login-card{background:var(--card);border-radius:18px;box-shadow:var(--shadow-lg);padding:34px 28px;width:100%;max-width:420px;text-align:center}
.login-logo{width:76px;height:76px;border-radius:50%;object-fit:cover;border:3px solid var(--krs-gelb);margin-bottom:14px;background:#fff}
.login-card h1{font-size:22px;color:var(--krs-blau);margin-bottom:4px}
.login-card .sub{color:var(--text-dim);font-size:14px;margin-bottom:22px}
.code-input{width:100%;padding:14px;border:2px solid var(--border);border-radius:10px;font-size:22px;text-align:center;font-family:'SF Mono',Menlo,Consolas,monospace;letter-spacing:2px;text-transform:uppercase;outline:none}
.code-input:focus{border-color:var(--krs-blau)}
.login-btn{width:100%;margin-top:14px;padding:14px;background:var(--krs-orange);color:#fff;font-weight:700;font-size:16px;border-radius:10px}
.login-btn:disabled{opacity:.55;cursor:default}
.login-err{margin-top:12px;color:var(--danger);font-size:14px;font-weight:600}
.code-hint{display:inline-block;background:var(--bg-subtle);padding:3px 8px;border-radius:4px;font-family:'SF Mono',Menlo,Consolas,monospace;font-size:13px;border:1px solid var(--border);margin:0 2px}
.login-help{margin-top:18px;font-size:13px;color:var(--text-dim);line-height:1.5}

/* ===== Header ===== */
.hdr{background:var(--krs-blau);color:#fff;padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:var(--shadow)}
.hdr img{width:38px;height:38px;border-radius:50%;object-fit:cover;background:#fff;border:2px solid var(--krs-gelb)}
.hdr .t{flex:1;min-width:0}
.hdr .t b{display:block;font-size:15px}
.hdr .t span{font-size:12px;opacity:.85}
.hdr .user{font-size:12px;text-align:right;line-height:1.35}
.hdr .user b{font-size:13px}
.logout-btn{color:#fff;opacity:.85;font-size:12px;text-decoration:underline;min-height:auto;padding:4px}

/* ===== Layout ===== */
.wrap{max-width:760px;margin:0 auto;padding:16px 14px 60px}
.back-btn{color:var(--krs-blau);font-weight:600;font-size:14px;padding:8px 0;display:inline-flex;align-items:center;gap:6px}
h2.page{font-size:19px;color:var(--krs-blau);margin:6px 0 14px}

/* ===== Demnächst-Leiste ===== */
.soon{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:16px}
.soon h3{font-size:13px;text-transform:uppercase;letter-spacing:.6px;color:var(--text-dim);margin-bottom:10px}
.soon-item{display:flex;gap:10px;align-items:baseline;padding:5px 0;font-size:14px}
.soon-item .d{font-weight:700;color:var(--krs-orange);white-space:nowrap;font-size:13px;min-width:64px}
.soon-empty{color:var(--text-dim);font-size:14px}

/* ===== Kacheln ===== */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:560px){.grid{grid-template-columns:repeat(3,1fr)}}
.tile{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px 14px;text-align:center;position:relative;display:flex;flex-direction:column;align-items:center;gap:6px;color:var(--text);text-decoration:none;min-height:118px;justify-content:center;border:1px solid transparent}
.tile:active{transform:scale(.98)}
.tile .ic{font-size:30px;line-height:1}
.tile b{font-size:14.5px}
.tile span{font-size:11.5px;color:var(--text-dim);line-height:1.35}
.tile.disabled{opacity:.55}
.tile.disabled b::after{content:''}
.tile .badge{position:absolute;top:8px;right:10px;background:var(--krs-orange);color:#fff;font-size:11px;font-weight:800;border-radius:999px;min-width:20px;height:20px;display:flex;align-items:center;justify-content:center;padding:0 6px}
.tile .soon-tag{position:absolute;top:8px;left:10px;background:var(--bg-subtle);color:var(--text-dim);font-size:10px;font-weight:700;border-radius:4px;padding:2px 6px;text-transform:uppercase;letter-spacing:.5px}
.sec-label{font-size:12px;text-transform:uppercase;letter-spacing:.7px;color:var(--text-dim);margin:20px 0 10px;font-weight:700}

/* ===== Listen / Cards ===== */
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px}
.empty{color:var(--text-dim);text-align:center;padding:32px 12px;font-size:14.5px;line-height:1.6}

/* ===== Kalender ===== */
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.chip{padding:7px 13px;border-radius:999px;border:1px solid var(--border);background:var(--card);font-size:13px;font-weight:600;color:var(--text-dim)}
.chip.on{background:var(--krs-blau);color:#fff;border-color:var(--krs-blau)}
.termin{display:flex;gap:12px;align-items:flex-start}
.termin .datum{min-width:52px;text-align:center;background:var(--bg-subtle);border-radius:10px;padding:6px 4px}
.termin .datum b{display:block;font-size:18px;color:var(--krs-blau)}
.termin .datum span{font-size:11px;color:var(--text-dim);text-transform:uppercase}
.termin .inhalt{flex:1}
.termin .inhalt b{font-size:15px}
.termin .inhalt p{font-size:13px;color:var(--text-dim);margin-top:2px}
.typ-tag{display:inline-block;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;border-radius:4px;padding:2px 7px;margin-left:6px;vertical-align:middle}
.typ-klassenarbeit{background:#fdeee2;color:var(--krs-orange)}
.typ-termin{background:#e8eef3;color:var(--krs-blau)}
.typ-event{background:#fdf6e3;color:#a07c1a}
.typ-ferien{background:#e4f5ee;color:var(--success)}

/* ===== Teams ===== */
.team-row{display:flex;align-items:center;gap:12px;width:100%;text-align:left}
.team-row .ic{width:42px;height:42px;border-radius:10px;background:var(--bg-subtle);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.team-row .m{flex:1;min-width:0}
.team-row .m b{font-size:15px;display:block}
.team-row .m span{font-size:12.5px;color:var(--text-dim)}
.posts{display:flex;flex-direction:column;gap:10px;margin:14px 0}
.post{max-width:86%;background:var(--card);border-radius:12px;box-shadow:var(--shadow);padding:10px 13px;align-self:flex-start}
.post.eigen{align-self:flex-end;background:#e8f0f7}
.post.lehrer{border-left:3px solid var(--krs-orange)}
.post .a{font-size:12px;font-weight:700;color:var(--krs-blau);margin-bottom:3px}
.post .a .lt{color:var(--krs-orange)}
.post .txt{font-size:14.5px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
.post .ts{font-size:10.5px;color:var(--text-dim);margin-top:4px;text-align:right}
.composer{display:flex;gap:8px;position:sticky;bottom:10px;align-items:flex-end}
.composer textarea{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:15px;resize:none;background:var(--card);outline:none;min-height:44px;max-height:120px}
.composer textarea:focus{border-color:var(--krs-blau)}
.composer button{background:var(--krs-orange);color:#fff;border-radius:12px;padding:0 18px;font-weight:700;flex:none}
.composer button:disabled{opacity:.5}

/* ===== Rich-Text-Editor ===== */
.rt-wrap{flex:1;display:flex;flex-direction:column;gap:6px;min-width:0}
.rt-toolbar{display:flex;gap:4px;flex-wrap:wrap}
.rt-toolbar button{min-height:44px;min-width:44px;border:1px solid var(--border);border-radius:10px;background:var(--card);font-size:15px;padding:0 6px;color:var(--text);display:inline-flex;align-items:center;justify-content:center}
.rt-toolbar button:active{background:var(--bg-subtle)}
.rt-toolbar .sw{width:18px;height:18px;border-radius:50%;display:inline-block;border:1px solid var(--border)}
.rich-editor{border:1.5px solid var(--border);border-radius:12px;padding:10px 12px;font-size:15px;background:var(--card);outline:none;min-height:44px;max-height:180px;overflow-y:auto;line-height:1.45;word-wrap:break-word}
.rich-editor:focus{border-color:var(--krs-blau)}
.rich-editor:empty::before{content:attr(data-placeholder);color:var(--text-dim);pointer-events:none}
.rich-editor.tall{min-height:110px;max-height:none}
.rich-editor img,.txt.rich img{max-width:100%;height:auto;border-radius:8px;margin:6px 0;display:block}
.txt.rich{white-space:normal}
.txt.rich p{margin:0 0 6px}
.txt.rich p:last-child{margin-bottom:0}
.txt.rich ul,.txt.rich ol{padding-left:20px;margin:4px 0}
.txt.rich blockquote{border-left:3px solid var(--border);padding-left:10px;color:var(--text-dim);margin:6px 0}
.txt.rich pre,.txt.rich code{background:var(--bg-subtle);border-radius:6px;padding:2px 5px;font-size:13px}

/* ===== Nachrichten ===== */
.form label{display:block;font-size:13px;font-weight:700;color:var(--text-dim);margin:12px 0 5px}
.form input,.form select,.form textarea{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-size:15px;background:var(--card);outline:none}
.form input:focus,.form select:focus,.form textarea:focus{border-color:var(--krs-blau)}
.form textarea{min-height:110px;resize:vertical}
.primary-btn{background:var(--krs-orange);color:#fff;font-weight:700;border-radius:10px;padding:12px 22px;margin-top:16px;font-size:15px}
.primary-btn:disabled{opacity:.55}
.msg-card .betreff{font-size:15px}
.msg-card .meta{font-size:12px;color:var(--text-dim);margin:3px 0 8px}
.msg-card .txt{font-size:14px;line-height:1.5;white-space:pre-wrap}
.antwort{margin-top:10px;background:#f2f7f4;border-left:3px solid var(--success);border-radius:0 8px 8px 0;padding:9px 12px}
.antwort .al{font-size:11.5px;font-weight:800;color:var(--success);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.offen-tag{font-size:11px;font-weight:700;color:var(--text-dim);background:var(--bg-subtle);border-radius:4px;padding:2px 7px}

/* ===== Links ===== */
.link-row{display:flex;align-items:center;gap:12px;text-decoration:none;color:var(--text)}
.link-row .ic{font-size:20px}
.link-row .m{flex:1;min-width:0}
.link-row .m b{font-size:14.5px;display:block}
.link-row .m span{font-size:12.5px;color:var(--text-dim)}
.link-row .arrow{color:var(--text-dim)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:11px 20px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:var(--shadow-lg);z-index:200;max-width:92vw;text-align:center}
.toast.err{background:var(--danger)}
.toast.ok{background:var(--success)}

/* ===== Hinweis-Banner (Fallback) ===== */
.banner{background:#fdf6e3;border:1px solid #ecd9a0;color:#7a5c10;border-radius:10px;padding:10px 14px;font-size:13px;line-height:1.5;margin-bottom:14px}

.loading-wrap{display:flex;justify-content:center;padding:40px}
.loading-spinner{width:38px;height:38px;border:3px solid var(--border);border-top-color:var(--krs-blau);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
<!-- Tenant-Konfiguration — MUSS vor allen anderen Scripts geladen werden -->
<script src="tenant.js"></script>
<script src="krs-supabase-config.js"></script>
<!-- Version gepinnt (Review-Finding 🟢14: kein ungepinntes @2) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4"></script>
<!-- DOMPurify (gepinnt) + CDN-Fallback; wenn beide fehlen: Legacy-Sanitizer im App-Code -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.4.11/purify.min.js"></script>
<script>if(!window.DOMPurify){document.write('<script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.11/dist/purify.min.js"><\/script>');}</script>
<script>
// =====================================================================
// HubData — DataService (Dual-Mode: Demo + Produktiv)
// Produktiv: AUSSCHLIESSLICH SECURITY-DEFINER-RPCs (hub_*) in der
// Schüler-DB (Projektwahl-Projekt). Kein Zugriff auf Lehrer-Systeme.
// =====================================================================
(function () {
  'use strict';

  const CFG = window.KRS_SUPABASE || {};
  const _qs = new URLSearchParams(window.location.search);
  const _forceMode = _qs.get('forceMode');
  const HAS_SUPABASE =
    _forceMode !== 'demo' &&
    !!CFG.url && !!(CFG.publishableKey || CFG.anonKey) &&
    typeof window.supabase !== 'undefined';

  // ---------- Demo-Daten (keine echten Personen!) ----------
  const heute = new Date();
  const iso = (d) => d.toISOString().slice(0, 10);
  const plus = (t) => { const d = new Date(heute); d.setDate(d.getDate() + t); return d; };

  const MOCK = {
    schueler: {
      'MIA-TEST': { code: 'MIA-TEST', vorname: 'Mia', nachname: 'Muster', klasse: '7b', klassenstufe: 7 },
      '7B-TEST':  { code: '7B-TEST',  vorname: 'Tim', nachname: 'Test',   klasse: '7b', klassenstufe: 7 }
    },
    lehrer: [
      { kuerzel: 'Ko', anzeigename: 'Herr Kotzan' },
      { kuerzel: 'Mu', anzeigename: 'Frau Musterfrau' },
      { kuerzel: 'Be', anzeigename: 'Herr Beispiel' }
    ],
    teams: [
      { id: 't1', name: 'Projekt: Schulgarten', beschreibung: 'Projektwoche 2026', typ: 'projekt', lehrer: 'Frau Musterfrau' },
      { id: 't2', name: 'Schulband', beschreibung: 'Probe immer donnerstags', typ: 'ag', lehrer: 'Herr Kotzan' }
    ],
    posts: {
      t1: [
        { id: 'p1', autor_typ: 'lehrer', autor_name: 'Frau Musterfrau', eigener: false, inhalt: '<p>Willkommen im Projekt Schulgarten! Denkt am <b>Dienstag</b> an <span style="color: #C0392B">Gartenhandschuhe</span> und alte Kleidung.</p>', created_at: plus(-2).toISOString() },
        { id: 'p2', autor_typ: 'schueler', autor_name: 'Leo K.', eigener: false, inhalt: 'Sollen wir auch Gießkannen mitbringen?', created_at: plus(-1).toISOString() }
      ],
      t2: [
        { id: 'p3', autor_typ: 'lehrer', autor_name: 'Herr Kotzan', eigener: false, inhalt: 'Nächste Probe: Donnerstag, 7. Stunde im Musiksaal. Wir üben das Sommerfest-Set!', created_at: plus(-3).toISOString() }
      ]
    },
    termine: [
      { id: 'e1', titel: 'Mathe-Klassenarbeit', beschreibung: 'Themen: Terme und Gleichungen', datum: iso(plus(4)), typ: 'klassenarbeit', klasse: '7b' },
      { id: 'e2', titel: 'Englisch-Vokabeltest', beschreibung: 'Unit 5', datum: iso(plus(7)), typ: 'klassenarbeit', klasse: '7b' },
      { id: 'e3', titel: 'Projekttage', beschreibung: 'Drei Tage Projekte an der KRS', datum: '2026-07-21', typ: 'event', klasse: null },
      { id: 'e4', titel: 'Schulfest', beschreibung: 'Präsentation der Projekte, ab 14 Uhr', datum: '2026-07-24', typ: 'event', klasse: null },
      { id: 'e5', titel: 'Sommerferien', beschreibung: 'Endlich!', datum: '2026-07-30', typ: 'ferien', klasse: null }
    ],
    links: [
      { id: 'l1', titel: 'Schul-Homepage', url: 'https://realschule-schriesheim.de/', beschreibung: 'Aktuelles von der KRS', kategorie: 'Allgemein' },
      { id: 'l2', titel: 'IServ', url: 'https://realschule-schriesheim.de/iserv/', beschreibung: 'Schul-Mail und Dateien', kategorie: 'Allgemein' },
      { id: 'l3', titel: 'Entschuldigungsformular', url: 'https://realschule-schriesheim.de/', beschreibung: 'Zum Ausdrucken', kategorie: 'Downloads' }
    ],
    nachrichten: [
      { id: 'n1', lehrer: 'Herr Kotzan', betreff: 'Frage zur Schulband', inhalt: 'Kann ich nächste Woche zur Probe dazukommen?', antwort: 'Klar, komm einfach Donnerstag in der 7. Stunde vorbei!', beantwortet_am: plus(-1).toISOString(), created_at: plus(-2).toISOString() }
    ]
  };
  let _mockPostSeq = 100;
  let _mockMsgCount = 0;

  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  // ---------- Supabase-Client ----------
  let _client = null;
  function client() {
    if (!_client) _client = window.supabase.createClient(CFG.url, CFG.publishableKey || CFG.anonKey);
    return _client;
  }

  // Erkennt "RPC existiert (noch) nicht" → Fallback auf get_schueler_status
  function isMissingFn(error) {
    const m = String(error && (error.message || error.code) || '');
    return m.includes('PGRST202') || /could not find the function/i.test(m) || /schema cache/i.test(m);
  }

  window.HubData = {
    isDemo: !HAS_SUPABASE,

    // Dashboard = Login. Liefert { success, schueler, teams, termine, links,
    // nachrichten_unbeantwortet, fallback? } oder { success:false, error }
    async getDashboard(code) {
      const clean = String(code || '').toUpperCase().trim();
      if (!clean) return { success: false, error: 'code_fehlt' };

      if (this.isDemo) {
        await sleep(250);
        const s = MOCK.schueler[clean];
        if (!s) return { success: false, error: 'code_unbekannt' };
        return {
          success: true, schueler: s,
          teams: MOCK.teams.map(t => ({ ...t })),
          termine: MOCK.termine.map(t => ({ ...t })),
          links: MOCK.links.map(l => ({ ...l })),
          nachrichten_unbeantwortet: MOCK.nachrichten.filter(n => !n.antwort).length
        };
      }

      const { data, error } = await client().rpc('hub_get_dashboard', { p_code: clean });
      if (error) {
        if (isMissingFn(error)) return this._dashboardFallback(clean);
        return { success: false, error: 'verbindung' };
      }
      return data;
    },

    // Fallback (Migration noch nicht eingespielt): Login über die
    // bewährte Projektwahl-RPC, Hub-Features als "bald" markiert.
    async _dashboardFallback(clean) {
      const { data, error } = await client().rpc('get_schueler_status', { p_code: clean });
      if (error) return { success: false, error: 'verbindung' };
      if (!data || data.success !== true) return { success: false, error: (data && data.error) || 'code_unbekannt' };
      const T = window.TENANT || {};
      return {
        success: true, fallback: true,
        schueler: data.schueler,
        teams: [], termine: [],
        links: (T.fallback_links || []).map((l, i) => ({ id: 'fb' + i, beschreibung: '', ...l })),
        nachrichten_unbeantwortet: 0
      };
    },

    async getTeamPosts(code, teamId) {
      if (this.isDemo) {
        await sleep(150);
        return { success: true, posts: (MOCK.posts[teamId] || []).map(p => ({ ...p })) };
      }
      const { data, error } = await client().rpc('hub_get_team_posts', { p_code: code, p_team_id: teamId });
      if (error) return { success: false, error: 'verbindung' };
      return data;
    },

    async postToTeam(code, teamId, inhalt) {
      if (this.isDemo) {
        await sleep(150);
        const s = MOCK.schueler[code];
        if (!MOCK.posts[teamId]) MOCK.posts[teamId] = [];
        MOCK.posts[teamId].push({
          id: 'p' + (_mockPostSeq++), autor_typ: 'schueler',
          autor_name: s.vorname + ' ' + s.nachname.slice(0, 1) + '.',
          eigener: true, inhalt: inhalt, created_at: new Date().toISOString()
        });
        return { success: true };
      }
      const { data, error } = await client().rpc('hub_post_to_team', { p_code: code, p_team_id: teamId, p_inhalt: inhalt });
      if (error) return { success: false, error: 'verbindung' };
      return data;
    },

    async getLehrerListe() {
      if (this.isDemo) { await sleep(100); return MOCK.lehrer.map(l => ({ ...l })); }
      const { data, error } = await client().rpc('hub_get_lehrer_liste');
      if (error) return [];
      return data || [];
    },

    async sendNachricht(code, kuerzel, betreff, inhalt) {
      if (this.isDemo) {
        await sleep(200);
        if (++_mockMsgCount > 5) return { success: false, error: 'rate_limit' };
        const l = MOCK.lehrer.find(x => x.kuerzel === kuerzel);
        MOCK.nachrichten.unshift({
          id: 'n' + Date.now(), lehrer: l ? l.anzeigename : kuerzel,
          betreff, inhalt, antwort: null, beantwortet_am: null, created_at: new Date().toISOString()
        });
        return { success: true };
      }
      const { data, error } = await client().rpc('hub_send_nachricht', { p_code: code, p_kuerzel: kuerzel, p_betreff: betreff, p_inhalt: inhalt });
      if (error) return { success: false, error: 'verbindung' };
      return data;
    },

    async getMeineNachrichten(code) {
      if (this.isDemo) { await sleep(120); return { success: true, nachrichten: MOCK.nachrichten.map(n => ({ ...n })) }; }
      const { data, error } = await client().rpc('hub_get_meine_nachrichten', { p_code: code });
      if (error) return { success: false, error: 'verbindung' };
      return data;
    }
  };
})();
</script>

<body>
<div id="app"></div>
<script type="module">
import { h, render } from 'https://esm.sh/preact@10.19.3';
import { useState, useEffect, useRef } from 'https://esm.sh/preact@10.19.3/hooks';
import htm from 'https://esm.sh/htm@3.1.1';
const html = htm.bind(h);

const T = window.TENANT || {};
const D = window.HubData;
const LS_KEY = 'krs_sh_code';

const ERR_TEXT = {
  code_unbekannt: 'Dieser Code ist nicht bekannt. Bitte prüfe die Schreibweise (z. B. 7B-A7K2).',
  code_fehlt: 'Bitte gib deinen Anmelde-Code ein.',
  verbindung: 'Verbindungsproblem — bitte später noch einmal versuchen.',
  rate_limit: 'Du hast das Limit erreicht. Bitte warte etwas und versuche es dann wieder.',
  inhalt_laenge: 'Der Text ist zu kurz oder zu lang.',
  kein_mitglied: 'Du bist kein Mitglied dieses Teams.',
  lehrer_unbekannt: 'Diese Lehrkraft ist nicht verfügbar.'
};
const errText = (e) => ERR_TEXT[e] || ERR_TEXT.verbindung;

const fmtDatum = (s) => {
  const d = new Date(s + 'T00:00:00');
  return { tag: d.getDate(), monat: d.toLocaleDateString('de-DE', { month: 'short' }), wtag: d.toLocaleDateString('de-DE', { weekday: 'short' }) };
};
const fmtKurz = (s) => new Date(s + 'T00:00:00').toLocaleDateString('de-DE', { weekday: 'short', day: '2-digit', month: '2-digit' });
const fmtZeit = (s) => new Date(s).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' }) + ', ' + new Date(s).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });

const TYP_LABEL = { klassenarbeit: 'Klassenarbeit', termin: 'Termin', event: 'Event', ferien: 'Ferien' };

// =====================================================================
// Rich-Text: Sanitizing (Skills: wysiwyg-paste-farben-bilder, dompurify-cdn)
// KERN-LEKTION aus KRS Connect: Paste-Simplifier und Render-Sanitizer
// MÜSSEN dieselbe Whitelist haben, sonst silent data loss. Hier gelöst,
// indem beide Stufen wortwörtlich DIESELBE Funktion nutzen.
// =====================================================================
const LIMITS = { text: 2000, betreff: 150, html: 200000 };

const DEFAULT_COLORS = ['black','#000','#000000','windowtext','inherit','initial','currentcolor','auto','rgb(0,0,0)','rgb(0, 0, 0)'];

function safeColorVal(v) {
  v = String(v || '').trim();
  if (!v || /url|expression|javascript|[<>{}\\]/i.test(v)) return false;
  if (/^#[0-9a-f]{3,8}$/i.test(v)) return true;
  if (/^[a-z]+$/i.test(v)) return true;
  if (/^(rgb|rgba|hsl|hsla)\(\s*[\d.,\s%]+\)$/i.test(v)) return true;
  return false;
}

// style-Attribut auf sichere Whitelist reduzieren (nur Farbe/Hintergrund/Fett/Kursiv/Unterstrichen)
function filterSafeStyle(node) {
  if (!node || !node.hasAttribute || !node.hasAttribute('style')) return;
  const style = node.getAttribute('style'), keep = [];
  const grab = (re) => { const m = re.exec(style); return m ? m[1].trim() : null; };
  const c = grab(/(?:^|;|\s)color\s*:\s*([^;]+)/i);
  if (c && safeColorVal(c) && !DEFAULT_COLORS.includes(c.toLowerCase())) keep.push('color: ' + c);
  const bg = grab(/(?:^|;|\s)background-color\s*:\s*([^;]+)/i);
  if (bg && safeColorVal(bg) && !DEFAULT_COLORS.includes(bg.toLowerCase())) keep.push('background-color: ' + bg);
  const fw = grab(/font-weight\s*:\s*([^;]+)/i);
  if (fw && (/bold/i.test(fw) || parseInt(fw, 10) >= 600)) keep.push('font-weight: 700');
  if (/font-style\s*:\s*italic/i.test(style)) keep.push('font-style: italic');
  if (/text-decoration\s*:[^;]*underline/i.test(style)) keep.push('text-decoration: underline');
  keep.length ? node.setAttribute('style', keep.join('; ')) : node.removeAttribute('style');
}

// Bild-Quellen: nur http(s) + data:image/* (kein javascript:, kein data:text/html)
function isSafeImageSrc(src) {
  src = String(src || '').trim();
  return /^https?:\/\//i.test(src) || /^data:image\/(png|jpe?g|gif|webp|bmp|svg\+xml);/i.test(src);
}

const RT_TAGS = ['p','br','b','strong','i','em','u','s','a','ul','ol','li','h1','h2','h3','blockquote','pre','code','span','div','img'];
const RT_ATTR = ['href','target','rel','style','src','alt','width','height'];

// Legacy-Fallback falls DOMPurify-CDN nicht lädt (Skill dompurify-cdn) —
// Formatierung bleibt weitgehend, data:-Bilder werden verworfen (bewusst strenger).
function legacySanitize(htmlStr) {
  const tmp = document.createElement('div');
  tmp.innerHTML = String(htmlStr || '');
  tmp.querySelectorAll('script,iframe,object,embed,form,input,button,style,link,svg,math,meta,base').forEach(el => el.remove());
  tmp.querySelectorAll('*').forEach(el => {
    for (const attr of [...el.attributes]) {
      const n = attr.name.toLowerCase(), v = attr.value.trim().toLowerCase();
      if (n.startsWith('on') || n === 'srcdoc') el.removeAttribute(attr.name);
      else if (n === 'href' && !/^https?:/i.test(v)) el.removeAttribute(attr.name);
      else if (n === 'src' && v.startsWith('data:')) el.removeAttribute(attr.name);
      else if (!RT_ATTR.includes(n)) el.removeAttribute(attr.name);
    }
    if (!RT_TAGS.includes(el.tagName.toLowerCase())) el.replaceWith(...el.childNodes);
  });
  return tmp.innerHTML;
}

// DIE zentrale Sanitize-Funktion — für Paste (Stufe 1) UND Rendern (Stufe 2).
function sanitizeHtml(htmlStr) {
  if (!htmlStr) return '';
  const tmp = document.createElement('div');
  tmp.innerHTML = (window.DOMPurify && window.DOMPurify.sanitize)
    ? window.DOMPurify.sanitize(String(htmlStr), { ALLOWED_TAGS: RT_TAGS, ALLOWED_ATTR: RT_ATTR, ADD_DATA_URI_TAGS: ['img'], ALLOW_DATA_ATTR: false })
    : legacySanitize(htmlStr);
  // DOM-Nachbearbeitung (robuster als DOMPurify-Hooks, siehe Skill):
  tmp.querySelectorAll('[style]').forEach(filterSafeStyle);
  tmp.querySelectorAll('img').forEach(img => {
    if (!isSafeImageSrc(img.getAttribute('src') || '')) { img.remove(); return; }
    img.removeAttribute('style');
    img.setAttribute('loading', 'lazy');
    img.setAttribute('referrerpolicy', 'no-referrer');
  });
  tmp.querySelectorAll('a').forEach(a => { a.setAttribute('target', '_blank'); a.setAttribute('rel', 'noopener noreferrer'); });
  return tmp.innerHTML;
}
// Stufe 1 = Stufe 2 per Konstruktion (kein Whitelist-Drift möglich):
const simplifyPastedHtml = sanitizeHtml;

// Sichtbaren Text extrahieren (für Zeichen-Limit — Base64-Bilder zählen NICHT mit).
// DOMParser ist inert: führt keine Skripte aus, lädt keine Bilder.
function htmlToText(htmlStr) {
  if (!htmlStr) return '';
  const doc = new DOMParser().parseFromString(String(htmlStr), 'text/html');
  doc.body.querySelectorAll('br,p,div,li,h1,h2,h3,blockquote,pre,tr').forEach(el => el.insertAdjacentText('beforeend', '\n'));
  return (doc.body.textContent || '').replace(/ /g, ' ').replace(/\n{2,}/g, '\n').trim();
}

const escapeText = (s) => String(s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
const looksLikeHtml = (s) => /<[a-z][\s\S]*>/i.test(String(s || ''));

// Test-Hooks (Playwright, hermetisch via page.evaluate)
window.__sanitizeHtml = sanitizeHtml;
window.__simplifyPastedHtml = simplifyPastedHtml;
window.__htmlToText = htmlToText;
window.__richLimits = LIMITS;

// Gerenderter Inhalt: Rich-HTML sanitized, Alt-/Plaintext wie bisher (pre-wrap)
function ContentView({ inhalt }) {
  return looksLikeHtml(inhalt)
    ? html`<div class="txt rich" dangerouslySetInnerHTML=${{ __html: sanitizeHtml(inhalt) }}></div>`
    : html`<div class="txt">${inhalt}</div>`;
}

// =====================================================================
// RichEditor — contentEditable mit Toolbar (Fett/Kursiv/Unterstrichen/Farben)
// Stale-Closure-sicher: unkontrolliert, State wird bei jedem Input aktuell
// gehalten; innerHTML wird nur beim Leeren (nach Senden) zurückgesetzt.
// =====================================================================
const TEXT_COLORS = [['KRS-Orange','#E87722'],['Rot','#C0392B'],['Grün','#1E8449'],['Blau','#2D6CDF'],['Standard','#22303c']];

function RichEditor({ value, onChange, placeholder, testid, tall }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current && !value && ref.current.innerHTML) ref.current.innerHTML = ''; }, [value]);
  const emit = () => { if (ref.current) onChange(ref.current.innerHTML); };
  const exec = (cmd, val) => {
    const el = ref.current; if (!el) return;
    el.focus();
    // styleWithCSS VOR foreColor, sonst <font>-Tag, das der Sanitizer wegwirft (Skill-Falle)
    try { document.execCommand('styleWithCSS', false, true); } catch (e) {}
    try { document.execCommand(cmd, false, val); } catch (e) {}
    try { document.execCommand('styleWithCSS', false, false); } catch (e) {}
    emit();
  };
  const onPaste = (e) => {
    e.preventDefault();
    const cd = e.clipboardData || window.clipboardData;
    const htmlData = cd && cd.getData && cd.getData('text/html');
    const ins = htmlData
      ? simplifyPastedHtml(htmlData)
      : escapeText(cd && cd.getData ? cd.getData('text/plain') : '').replace(/\r?\n/g, '<br>');
    try { document.execCommand('insertHTML', false, ins); } catch (e2) {}
    emit();
  };
  return html`
    <div class="rt-wrap">
      <div class="rt-toolbar" role="toolbar" aria-label="Formatierung">
        <button type="button" aria-label="Fett" title="Fett" onClick=${() => exec('bold')}><b>F</b></button>
        <button type="button" aria-label="Kursiv" title="Kursiv" onClick=${() => exec('italic')}><i>K</i></button>
        <button type="button" aria-label="Unterstrichen" title="Unterstrichen" onClick=${() => exec('underline')}><u>U</u></button>
        ${TEXT_COLORS.map(([name, col]) => html`
          <button type="button" key=${col} aria-label="Textfarbe ${name}" title=${name}
            onClick=${() => exec('foreColor', col)}><span class="sw" style="background:${col}"></span></button>`)}
        <button type="button" aria-label="Formatierung entfernen" title="Formatierung entfernen" onClick=${() => exec('removeFormat')}>⌫</button>
      </div>
      <div class="rich-editor ${tall ? 'tall' : ''}" data-testid=${testid} contentEditable="true"
        data-placeholder=${placeholder} onInput=${emit} onPaste=${onPaste} ref=${ref}></div>
    </div>`;
}

function Toast({ toast }) {
  if (!toast) return null;
  return html`<div class="toast ${toast.typ || ''}">${toast.text}</div>`;
}

function Spinner() {
  return html`<div class="loading-wrap"><div class="loading-spinner"></div></div>`;
}

// ============================ LOGIN ============================

        <button class="login-btn" data-testid="login-btn" type="submit" disabled=${busy}>

          ${D.isDemo && html`<br/><br/>Demo-Modus: probiere <span class="code-hint">MIA-TEST</span>`}

    </div>`;
}

// ============================ DASHBOARD ============================
function Dashboard({ dash, code, go }) {
  const s = dash.schueler;
  const naechste = (dash.termine || []).slice(0, 3);
  const moduleTiles = (T.module || []).map(m => {
    const disabled = !m.url;

  });
  return html`
    ${dash.fallback && html`<div class="banner">🔧 Der Schüler-Hub ist im <b>Vorschau-Modus</b>: Kalender, Teams und Nachrichten werden bald freigeschaltet. Die App-Links funktionieren schon!</div>`}

      </button>
      <button class="tile" data-testid="tile-links" onClick=${() => go('links')}>

    <div class="sec-label">Meine Apps</div>
    <div class="grid">
      ${moduleTiles.map(m => m.disabled
        ? html`<div class="tile disabled" key=${m.id}><span class="soon-tag">bald</span><span class="ic">${m.icon}</span><b>${m.name}</b><span>${m.beschreibung}</span></div>`
        : html`<a class="tile" key=${m.id} href="${m.url}" target="_blank" rel="noopener noreferrer">
            <span class="ic">${m.icon}</span><b>${m.name}</b><span>${m.beschreibung}</span>
          </a>`)}
    </div>`;
}

// ============================ KALENDER ============================
function KalenderView({ dash }) {

// ============================ TEAMS ============================
function TeamsView({ dash, openTeam }) {
  const teams = dash.teams || [];
  const ICONS = { projekt: '🎨', ag: '🎵', klasse: '🏫', sonstig: '👥' };
  return html`
    <h2 class="page">👥 Meine Teams</h2>
    ${teams.length === 0
      ? html`<div class="empty">Du bist noch in keinem Team.<br/>Teams legen deine Lehrkräfte an — z. B. für Projekte oder AGs.</div>`
      : teams.map(t => html`
        <button class="card team-row" key=${t.id} data-testid="team-row" onClick=${() => openTeam(t)}>

        </button>`)}`;
}

function TeamDetail({ code, team, toast }) {
  const [posts, setPosts] = useState(null);
  const [text, setText] = useState('');
  const [busy, setBusy] = useState(false);
  const endRef = useRef(null);

  const load = async () => {
    const res = await D.getTeamPosts(code, team.id);
    if (res.success) setPosts(res.posts); else { setPosts([]); toast(errText(res.error), 'err'); }
  };
  useEffect(() => { load(); }, [team.id]);
  useEffect(() => { if (endRef.current) endRef.current.scrollIntoView({ block: 'end' }); }, [posts]);

  const send = async () => {
    const raw = text;
    const sichtbar = htmlToText(raw);
    if (!sichtbar || busy) return;
    if (sichtbar.length > LIMITS.text) { toast(`Der Text ist zu lang (max. ${LIMITS.text} Zeichen).`, 'err'); return; }
    if (raw.length > LIMITS.html) { toast('Der Beitrag ist mit Bildern zu groß — bitte Bilder verkleinern oder weglassen.', 'err'); return; }
    setBusy(true);
    const res = await D.postToTeam(code, team.id, sanitizeHtml(raw));
    setBusy(false);
    if (res.success) { setText(''); load(); }
    else toast(errText(res.error), 'err');
  };

  return html`
    <h2 class="page">${team.name}</h2>
    ${posts === null ? html`<${Spinner}/>` : html`
      <div class="posts" data-testid="posts">
        ${posts.length === 0 && html`<div class="empty">Noch keine Beiträge — schreib den ersten!</div>`}

          <div class="post ${p.eigener ? 'eigen' : ''} ${p.autor_typ === 'lehrer' ? 'lehrer' : ''}" key=${p.id}>
            <div class="a">${p.autor_name}${p.autor_typ === 'lehrer' && html` <span class="lt">· Lehrkraft</span>`}</div>
            <${ContentView} inhalt=${p.inhalt} />
            <div class="ts">${fmtZeit(p.created_at)}</div>
          </div>`)}
        <div ref=${endRef}></div>
      </div>
      ${T.teams_posting !== false ? html`
      <div class="composer">
        <${RichEditor} value=${text} onChange=${setText} placeholder="Nachricht ans Team …" testid="post-input" />
        <button data-testid="post-send" onClick=${send} disabled=${busy || !htmlToText(text)}>Senden</button>
      </div>` : html`
      <div class="banner">✍️ Schreiben in Teams ist noch nicht freigeschaltet — deine Lehrkräfte posten hier Infos für dich.</div>`}`}`;
}

// ============================ NACHRICHTEN ============================
function NachrichtenView({ code, toast }) {
  const [nachrichten, setNachrichten] = useState(null);
  const [lehrer, setLehrer] = useState([]);
  const [zeigeForm, setZeigeForm] = useState(false);
  const [kuerzel, setKuerzel] = useState('');
  const [betreff, setBetreff] = useState('');
  const [inhalt, setInhalt] = useState('');
  const [busy, setBusy] = useState(false);

  const load = async () => {
    const [res, ll] = await Promise.all([D.getMeineNachrichten(code), D.getLehrerListe()]);
    setNachrichten(res.success ? res.nachrichten : []);
    setLehrer(ll);
  };
  useEffect(() => { load(); }, []);

  const send = async (e) => {
    e.preventDefault();
    if (busy) return;
    if (!kuerzel) { toast('Bitte eine Lehrkraft auswählen.', 'err'); return; }
    const sichtbar = htmlToText(inhalt);
    if (!betreff.trim()) { toast('Bitte einen Betreff eingeben.', 'err'); return; }
    if (!sichtbar) { toast('Bitte eine Nachricht schreiben.', 'err'); return; }
    if (sichtbar.length > LIMITS.text) { toast(`Der Text ist zu lang (max. ${LIMITS.text} Zeichen).`, 'err'); return; }
    if (inhalt.length > LIMITS.html) { toast('Die Nachricht ist mit Bildern zu groß — bitte Bilder verkleinern oder weglassen.', 'err'); return; }
    setBusy(true);
    const res = await D.sendNachricht(code, kuerzel, betreff.trim(), sanitizeHtml(inhalt));
    setBusy(false);
    if (res.success) {
      toast('Nachricht gesendet! Die Antwort erscheint hier.', 'ok');
      setZeigeForm(false); setBetreff(''); setInhalt(''); setKuerzel('');
      load();
    } else toast(errText(res.error), 'err');
  };

  return html`
    <h2 class="page">✉️ Lehrkraft kontaktieren</h2>
    ${!zeigeForm && html`
      <button class="primary-btn" data-testid="neue-nachricht" style="margin:0 0 16px" onClick=${() => setZeigeForm(true)}>+ Neue Nachricht</button>`}
    ${zeigeForm && html`
      <form class="card form" onSubmit=${send}>
        <label>An</label>
        <select data-testid="lehrer-select" value=${kuerzel} onChange=${(e) => setKuerzel(e.target.value)}>
          <option value="">– Lehrkraft wählen –</option>
          ${lehrer.map(l => html`<option value=${l.kuerzel} key=${l.kuerzel}>${l.anzeigename}</option>`)}
        </select>
        <label>Betreff</label>
        <input data-testid="betreff-input" maxlength="150" required value=${betreff} onInput=${(e) => setBetreff(e.target.value)} placeholder="Worum geht es?" />
        <label>Deine Nachricht</label>
        <${RichEditor} value=${inhalt} onChange=${setInhalt} tall=${true} placeholder="Schreib freundlich und konkret — wie in einer E-Mail." testid="inhalt-input" />
        <button class="primary-btn" data-testid="nachricht-senden" type="submit" disabled=${busy}>${busy ? 'Wird gesendet …' : 'Senden'}</button>
        <button type="button" style="margin:10px 0 0 12px;color:var(--text-dim)" onClick=${() => setZeigeForm(false)}>Abbrechen</button>
      </form>`}
    ${nachrichten === null ? html`<${Spinner}/>` : nachrichten.length === 0
      ? html`<div class="empty">Noch keine Nachrichten.</div>`
      : nachrichten.map(n => html`
        <div class="card msg-card" key=${n.id} data-testid="nachricht">
          <b class="betreff">${n.betreff}</b>
          <div class="meta">an ${n.lehrer} · ${fmtZeit(n.created_at)} ${!n.antwort && html`<span class="offen-tag">wartet auf Antwort</span>`}</div>
          <${ContentView} inhalt=${n.inhalt} />
          ${n.antwort && html`
            <div class="antwort">
              <div class="al">Antwort · ${fmtZeit(n.beantwortet_am)}</div>
              <${ContentView} inhalt=${n.antwort} />
            </div>`}
        </div>`)}`;
}

// ============================ LINKS ============================
function LinksView({ dash }) {
  // Nur http(s)-URLs rendern — verhindert javascript:-Links (🟡7)
  const links = (dash.links || []).filter(l => /^https?:\/\//i.test(l.url || ''));
  const kategorien = [...new Set(links.map(l => l.kategorie || 'Allgemein'))];
  return html`
    <h2 class="page">🔗 Links & Downloads</h2>
    ${links.length === 0 && html`<div class="empty">Noch keine Links eingetragen.</div>`}
    ${kategorien.map(k => html`
      <div key=${k}>
        <div class="sec-label">${k}</div>
        ${links.filter(l => (l.kategorie || 'Allgemein') === k).map(l => html`
          <a class="card link-row" key=${l.id} href="${l.url}" target="_blank" rel="noopener noreferrer">
            <span class="ic">🔗</span>
            <span class="m"><b>${l.titel}</b>${l.beschreibung && html`<span>${l.beschreibung}</span>`}</span>
            <span class="arrow">›</span>
          </a>`)}
      </div>`)}`;
}

// ============================ APP ============================
function App() {
  const qs = new URLSearchParams(window.location.search);
  const urlCode = (qs.get('code') || '').toUpperCase().trim();
  const savedCode = (() => { try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; } })();
  const startCode = urlCode || savedCode;

  const [code, setCode] = useState('');
  const [dash, setDash] = useState(null);
  const [view, setView] = useState('login');
  const [team, setTeam] = useState(null);
  const [busy, setBusy] = useState(false);
  const [loginError, setLoginError] = useState('');
  const [toastState, setToastState] = useState(null);
  const toastTimer = useRef(null);

  const toast = (text, typ) => {
    setToastState({ text, typ });
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToastState(null), 3500);
  };

  const login = async (c) => {
    const clean = String(c || '').toUpperCase().trim();
    setBusy(true); setLoginError('');
    const res = await D.getDashboard(clean);
    setBusy(false);
    if (res.success) {
      setCode(clean); setDash(res); setView('home');
      try { localStorage.setItem(LS_KEY, clean); } catch (e) {}
      // Code aus der Adresszeile entfernen (Browser-Verlauf auf
      // Familien-/Schulgeräten — Review-Finding 🟡6)
      if (urlCode) {
        try {
          const cleanQs = new URLSearchParams(window.location.search);
          cleanQs.delete('code');
          const rest = cleanQs.toString();
          history.replaceState(null, '', window.location.pathname + (rest ? '?' + rest : ''));
        } catch (e) {}
      }
    } else {
      setLoginError(errText(res.error));
    }
  };

  const logout = () => {
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    setCode(''); setDash(null); setView('login'); setLoginError('');
  };

  const refresh = async () => {
    const res = await D.getDashboard(code);
    if (res.success) setDash(res);
  };

  useEffect(() => { if (startCode) login(startCode); }, []);

  const go = (v) => { setView(v); if (v === 'home') refresh(); };
  const openTeam = (t) => { setTeam(t); setView('team'); };

  const badge = html`<div class="mode-badge ${D.isDemo ? 'demo' : 'produktiv'}" data-testid="mode-badge">${D.isDemo ? 'Demo' : 'Produktiv'}</div>`;

  if (view === 'login' || !dash) {
    return html`${badge}<${LoginView} onLogin=${login} busy=${busy} error=${loginError} initialCode=${startCode} /><${Toast} toast=${toastState} />`;
  }

  const s = dash.schueler;
  return html`
    ${badge}
    <header class="hdr">
      <img src="${(T.branding && T.branding.logo_url) || 'krs-logo.jpg'}" alt="" onError=${(e) => { e.target.style.display = 'none'; }} />
      <div class="t"><b>${(T.schule && T.schule.name_kurz) || 'KRS'} Schüler-Hub</b><span>${(T.schule && T.schule.name_lang) || ''}</span></div>
      <div class="user" data-testid="user-chip">
        <b>${s.vorname} ${s.nachname}</b><br/>Klasse ${s.klasse} · <button class="logout-btn" data-testid="logout" onClick=${logout}>Abmelden</button>
      </div>
    </header>
    <main class="wrap">
      ${view !== 'home' && html`<button class="back-btn" data-testid="back" onClick=${() => go(view === 'team' ? 'teams' : 'home')}>‹ Zurück</button>`}
      ${view === 'home' && html`<${Dashboard} dash=${dash} code=${code} go=${go} />`}
      ${view === 'kalender' && html`<${KalenderView} dash=${dash} />`}
      ${view === 'teams' && html`<${TeamsView} dash=${dash} openTeam=${openTeam} />`}
      ${view === 'team' && team && html`<${TeamDetail} code=${code} team=${team} toast=${toast} />`}
      ${view === 'nachrichten' && html`<${NachrichtenView} code=${code} toast=${toast} />`}
      ${view === 'links' && html`<${LinksView} dash=${dash} />`}
      <footer style="margin-top:36px;text-align:center;font-size:12px;color:var(--text-dim)">
        <a href="${(T.rechtliches && T.rechtliches.datenschutz_url) || 'https://realschule-schriesheim.de/datenschutz/'}" target="_blank" rel="noopener noreferrer">Datenschutz</a>
        · <a href="${(T.rechtliches && T.rechtliches.impressum_url) || 'https://realschule-schriesheim.de/impressum/'}" target="_blank" rel="noopener noreferrer">Impressum</a>
      </footer>
    </main>
    <${Toast} toast=${toastState} />`;
}

render(h(App), document.getElementById('app'));
</script>
</body>
</html>
